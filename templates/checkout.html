{% extends "base.html" %}
{% block content %}
<h2>Checkout</h2>
<form action="/place_order" method="POST">
    <div class="mb-3">
        <label>Shipping Address</label>
        <textarea name="shipping_address" class="form-control" required></textarea>
    </div>
    <div class="mb-3">
        <label>Payment Method</label>
        <select name="payment_method" class="form-control">
            <option value="credit_card">Credit Card</option>
            <option value="paypal">PayPal</option>
        </select>
    </div>
    <div class="mb-3">
        <label>Card Number</label>
        <input type="text" name="card_number" class="form-control" placeholder="4111-1111-1111-1111">
    </div>
    <div class="mb-3">
        <label>Expiry</label>
        <input type="text" name="card_expiry" class="form-control" placeholder="MM/YY">
    </div>
    <div class="mb-3">
        <label>CVV</label>
        <input type="text" name="card_cvv" class="form-control" placeholder="123">
    </div>
    <button type="submit" class="btn btn-success">Place Order</button>
</form>
{% endblock %}
